site_name: Ministry Mapper Documentation
site_description: Complete guide for setting up and using Ministry Mapper, a digital territory management system
site_author: Ministry Mapper Team
site_url: https://docs.ministry-mapper.com

theme:
  name: material
  language: en
  logo: assets/logo.png
  favicon: assets/favicon.ico
  palette:
    # Palette toggle for light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    # Palette toggle for dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

plugins:
  - search
  - i18n:
      docs_structure: folder
      fallback_to_default: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: zh
          name: 中文
          build: true
        - locale: id
          name: Indonesia
          build: true
        - locale: ms
          name: Melayu
          build: true
        - locale: ja
          name: 日本語
          build: true
        - locale: ko
          name: 한국어
          build: true
        - locale: es
          name: Español
          build: true
        - locale: ta
          name: தமிழ்
          build: true

nav:
  - Home: en/index.md
  - Getting Started:
      - Quick Start: en/getting-started.md
      - Features Overview: en/features.md
  - User Guide:
      - Using Ministry Mapper: en/user-guide.md
  - Technical Documentation:
      - Architecture Overview: en/architecture.md
      - Data Models & Schema: en/data-models.md
  - Deployment:
      - Deployment Guide: en/deployment.md
      - Self-Hosting Guide: en/self-hosting.md
      - Backend Setup: en/backend-setup.md
      - Frontend Setup: en/frontend-setup.md
  - Reference:
      - FAQ: en/faq.md
  - Legal:
      - Privacy Policy: en/privacy-policy.md
      - Terms of Service: en/terms-of-service.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true

extra:
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: 中文
      link: /zh/
      lang: zh
    - name: Indonesia
      link: /id/
      lang: id
    - name: Melayu
      link: /ms/
      lang: ms
    - name: 日本語
      link: /ja/
      lang: ja
    - name: 한국어
      link: /ko/
      lang: ko
    - name: Español
      link: /es/
      lang: es
  social:
    - icon: fontawesome/solid/desktop
      link: https://github.com/rimorin/ministry-mapper-v2
      name: Frontend Repository
    - icon: fontawesome/solid/server
      link: https://github.com/rimorin/ministry-mapper-be
      name: Backend Repository

copyright: Copyright &copy; 2024 Ministry Mapper Team
